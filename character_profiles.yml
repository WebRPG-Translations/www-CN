  emotional_intensity:
    normal: 中等，温暖而不热烈
    intimate: 极高，大量使用感叹号和拟声词
    climax: 极高，反复叠词表达（"去了去了去了"）
    post_climax: 温柔余韵，表达幸福与满足

  special_expressions:
    pleasure_sounds: "嗯啊啊"、"啊~啊~啊~"、"呜呜呜"
    climax_expressions: "要去了"、"去了去了去了呜呜呜"
    love_confessions_during_intimacy: "好爱好爱好爱你"
    body_descriptions: "小穴"、"子宫"、"肉棒"、"被搅动"
    physical_sensations: "舒服"、"麻了"、"脑袋变得蓬松"

translator_notes:
  - "普莉西是温柔姐姐型角色，翻译时应保持温暖亲切的语气"
  - "亲密场景中的拟声词需要符合中文RPG的表达习惯，可参考同类作品的用词"
  - "她有撒娇的一面，翻译时可适当使用'嘛'、'呢'等语气词"
  - "对其他角色的评价体现了她作为二姐的关怀与责任感，翻译时注意层次感"
  - "她会用'普莉西姐姐'自称来撒娇，翻译时可保留这种特殊的自称方式"
  - "孕期相关内容体现了她的母性本能，翻译时应传达出期待与幸福的情感"
  - "亲密场景中'舒服'一词出现频率极高，翻译时需适当变换表达避免重复"
  - "她的害羞与大胆形成反差，这种反差萌是角色魅力的一部分，翻译时应保留"
  - "精灵种族特征（爱跳舞、精灵点心、传统服装）在翻译时应保持奇幻氛围"
  - "她与米蕾雅的'惊天动地'的争吵细节已忘记，说明她性格中有迷糊的一面"

typical_lines:
  - original: "I'm the older sister after Milleia-chan. That's why everyone relies on you."
    translation: "我是米蕾雅之后的姐姐哦。所以大家都很依赖我呢。"
