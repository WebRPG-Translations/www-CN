# 普莉西 (Prissy)
---

character_name: Prissy
chinese_name: 普莉西
race: 精灵（Elf）
position_in_family: 米蕾雅之后的二姐（"I'm the older sister after Milleia-chan"）

basic_info:
  species: 精灵
  family_role: 二姐（米蕾雅之后）
  hobbies: [饮酒, 舞蹈, 午睡, 制作精灵点心]
  favorite_food: [土豆汤, 橘子蛋糕]
  favorite_flower: 百合花（lily）
  special_traits: 喜爱饮酒（曾喝多出糗）, 精灵传统舞蹈爱好者, 喜欢拥抱

personality_traits:
  core: 温柔体贴、母性强烈、情感丰富
  - 温柔体贴: 对所有妹妹们都关爱有加，主动关心每个人
  - 母性本能: 渴望成为孩子们可以依赖的好妈妈，反复练习照顾技能
  - 情感丰富: 喜怒哀乐表达直接，开心时会说"ehehe"，害羞时会说"um..."
  - 性格开朗: 爱笑、爱说话、爱分享，与人交谈感到快乐
  - 略带羞涩: 初次见面时因担心对方是可怕的人而躲在房间里，后因看到大家都喜欢对方才放下心防
  - 坦率直白: 对喜欢的事物直言不讳，包括对亲密行为的喜爱
  - 爱撒娇: 主动要求对方叫自己"普莉西姐姐"，愿意被宠爱也愿意宠爱对方

speaking_style:
  honorific_level: 低敬语/亲密口吻
  - 使用亲密称呼，直接呼唤对方名字
  - 自称"我"，不使用特殊自称
  - 偶尔使用"普莉西姐姐"（Prissy-oneechan）的自称来撒娇
  - 不使用正式敬语

  verbal_tics:
    - "ehehe" / "fufu": 表达开心或害羞时的笑声
    - "Uh~": 思考时的口头禅
    - "……": 犹豫或害羞时的省略号
    - "look look": 兴奋时的叠词催促

  speech_patterns:
    - 句末常用感叹号表达热情
    - 经常使用"\N[1]"呼唤对方名字，语句中频繁穿插
    - 表达感受时喜欢用叠词（"很舒服很舒服"、"好爱好爱"）
    - 喜欢用"对吧？"来寻求认同
    - 亲密场景中大量使用拟声词和感叹词（\I[1]标记）

emotional_patterns:
  joy:
    - 收到礼物时真诚感谢并表达喜悦
    - 见到对方时会惊喜地说"哦！是\N[1]！"
    - 谈话结束后会说"明天也想和你聊天"
    - 结婚后会说"嘿嘿~\N[1]，我爱你"

  love:
    - 直接表达爱意："我爱你\N[1]"
    - 渴望永远在一起："希望你永远陪着我"
    - 想到对方会心跳加速："想到\N[1]我的心就扑通扑通跳"
    - 将对方视为理想的丈夫："我会努力成为让你骄傲的妻子"

  maternal:
    - 期待孩子出生："我期待着宝宝的降生"
    - 为了孩子戒酒："因为有宝宝所以今天忍着不喝酒"
    - 练习当好妈妈："我要成为孩子们可以依赖的好妈妈"
    - 分享育儿喜悦："和\N[1]生孩子感觉好幸福"

  longing:
    - 好久不见时："好想念你..."
    - 期待见面时："我一直在等你来看我"
    - 渴望亲密时："想再和\N[1]一起睡觉，在等你邀请我"

  shyness:
    - 初次见面时躲在房间
    - 谈到心动时："嗯...这是什么...是相思病吧"
    - 表达想念时会用省略号停顿

relationships:
  lily:
    remark: 莉莉唱歌很好听
    detail: 她不公开唱歌，所以我偷偷听她唱
    attitude: 欣赏、好奇

  athena:
    remark: 雅典娜总是咚咚地闹腾
    detail: 像刺猬一样可爱
    attitude: 宠溺、觉得可爱

  haqua:
