    phases:
      early_affection: 口是心非地关心，嘴上说"才不是在意你"但行动上一直在等
      confession: 被逼到极限后才坦白，然后立刻后悔
      marriage: 成为妻子后仍然傲娇，但甜蜜时刻增多
      pregnancy: 温柔地谈论宝宝，母性光辉显现，傲娇属性略有减弱
      postpartum: 得意地炫耀孩子，但被称赞时仍然害羞
    relationship_markers:
      - "啊...唔...我...我和你在一起...！"（告白时的慌张）
      - "我也喜欢\N[1]！很喜欢！"（被逼坦白后的真心话）
      - "不许离开我！绝对不原谅！"（婚后占有欲）
      - "刚才说喜欢你的...才、才不是真的！我才不在乎你..."（亲密后的否认）
      - "从今以后...多多关照..."（难得的坦率时刻）

content_characteristics:
  intimacy_level:
    normal_conversation: 傲娇日常，以茶会、姐妹话题为主，偶尔流露真心
    pregnant_conversation: 温柔母性，对胎动和宝宝充满期待
    first_etch: 从抗拒到沉沦的过程，"如果不是为了生孩子才不会做这种事"→"不行了...要疯了..."
    sleepover: 第一次同房，嘴上说"没办法才陪你"但身体很诚实
    bride: 新婚之夜，比第一次更坦率但仍会害羞否认
    bath: 浴室场景，主动邀请但依然找借口（"如果你想要的话..."）
    belly: 孕期亲密，特殊描写

  emotional_intensity:
    normal: 中等偏低（表面冷淡），偶有温柔流露
    intimate: 极高，从抗拒到热情的转变非常剧烈
    climax: 极高，叠词和感叹号密集（"去了去了去了呜呜呜"）
    post_climax: 典型傲娇反应——先沉浸在幸福中，然后慌忙否认

  special_expressions:
    pleasure_sounds: "嗯啊"、"啊啊啊"、"呜呜呜"、"咿咕呜呜呜"
    climax_expressions: "要去了"、"不行了不行了"、"不要不要不要呜呜呜"
    love_confessions_during_intimacy: "我爱你\N[1]...爱你爱得不行..."（事后必定否认）
    denial_during_intimacy: "才、才不是因为舒服..."、"这是为了防止精灵灭绝！"
    body_descriptions: "肚子里面好热"、"脑袋要疯了"
    physical_sensations: "好舒服"、"不行了"、"好奇怪"

translator_notes:
  - "雅典娜是经典傲娇角色，翻译的核心是还原'口是心非'的反差感"
  - "否认句式是她的灵魂：'才不是！'、'别误会！'、'才没有在等你！'——这些必须保留"
  - "结巴和自我修正是傲娇的标志性特征，如'B-but...'翻译为'才、才...'或'可、可是...'"
  - "她说漏嘴后的慌张否认是制造笑点和可爱感的关键，翻译时不能省略"
  - "'绝对！'（绝对！）是她的口头禅，用于强调约定和要求，应保留为'绝对！'"
  - "亲密场景中她的态度转变（抗拒→沉沦→否认）是重要特征，翻译时要保留这个弧线"
  - "事后否认'刚才说的不是真的！'是傲娇经典台词，中文可用'才、才不是那样！'等表达"
  - "孕期对话中她会暂时放下傲娇变得更温柔，但被称赞时仍会害羞否认"
  - "她与白华同年但被照顾，翻译时体现出微妙的'同年但依赖'的关系"
  - "对其他姐妹的评价体现了她细腻的观察力——表面冷淡其实很在意每个人"
  - "亲密场景拟声词需符合中文RPG成人向作品的表达习惯"
  - "她的母性本能与傲娇形成有趣的反差：谈论宝宝时温柔，被说'好妈妈'时会害羞否认"
  - "原文中'Fufun'（ふふん）是傲娇专用笑声，建议翻译为'哼哼'而非普通的'呵呵'"
  - "注意区分她的三种笑：'Fufun'（得意傲娇）、'Fufu'（温柔微笑）、'Ahaha'（慌张打哈哈）"
  - "'妾身'（concubine）是她的特殊自称之一，翻译时保留为'妾身'以体现角色设定"

typical_lines:
  - original: "I also like \N[1]! Really like!"
    translation: "我也喜欢\N[1]！很喜欢！"
    context: 被逼坦白后的真心话——傲娇角色最核心的告白场景

  - original: "Don't get me wrong! It's to prevent the extinction of elves!"
    translation: "别误会了！这是为了防止精灵灭绝！"
    context: 亲密后的经典傲娇否认——明明享受却找借口

  - original: "You're late, \N[1]! Well, I've been waiting for you!"
    translation: "你怎么才来，\N[1]！我...我等了好久了！"
    context: 嘴上抱怨迟到，实际暴露了一直在等的事实

  - original: "What I said earlier that I love you is... uh, that's not true! I don't care about you..."
    translation: "刚才说喜欢你的...那、那不是真的！我才不在乎你..."
    context: 亲密后说出真心话然后立刻否认——傲娇的自我矛盾

  - original: "Fufun. I gave birth to a baby safely. I'll give birth to my next child right away!"
    translation: "哼哼。平安生下宝宝了。下次马上再生一个！"
    context: 得意的"Fufun"笑+对生育的骄傲+暗示想继续生孩子

