      initial: 日常对话温柔有礼，逐渐敞开心扉
      dating: 心跳加速、害羞但坦率表达爱意
      married: 称对方为"丈夫"，幸福感极高，反复表达感恩
      pregnant: 母性爆发，期待宝宝出生，分享胎动喜悦
      intimate: 从羞涩到热情的转变，纯真与欲望并存
      postpartum: 渴望继续生育，表达满足与幸福
    relationship_markers:
