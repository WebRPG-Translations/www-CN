# Haqua (白华) 角色深度档案
# 基于 RPG Maker MV 游戏对话文本分析

# ============================================================
# 1. 基本信息
# ============================================================
basic_info:
  name_ja: Haqua
  name_cn: 白华
  name_en: Haqua/Hakua
  race: 精灵族
  gender: 女性
  role: 主要恋爱对象之一 / 精灵族女性
  location: 精灵森林
  family_background:
    - 母亲性格严厉，教养严格
    - 从母亲处学到的知识现已成为宝贵财富
  hobbies:
    - 制作不同香味的香水（核心爱好）
    - 用森林中盛开的花朵制作香水
    - 在田地里种植花卉种子
  favorites:
    food:
      - 洋葱汤（喜欢新鲜洋葱的甜味）
      - 樱桃蛋糕（擅长用嘴打樱桃梗结）
    flower: 非洲菊（gerbera）
  special_traits:
    - 精灵族寿命极长
    - 拒绝透露具体年龄（认为询问年龄是失礼行为）
    - 称玩家角色为"精灵族的救世主"
    - 身体已经离不开与玩家角色的亲密关系
    - 怀孕期间无法求婚/赠送礼物

# ============================================================
# 2. 性格特征
# ============================================================
personality:
  core_traits:
    - 温柔贤淑：待人接物温和有礼，是典型的贤妻形象
    - 传统保守：重视礼节、尊敬长辈、恪守妻子本分
    - 感恩知足：对玩家角色的付出充满感激，常说"谢谢"
    - 母性本能：对孩子充满期待，怀孕时幸福感溢于言表
    - 害羞内敛：初次亲密时表现出强烈羞涩，但逐渐放开
    - 热情忠诚：一旦确立关系，全身心投入，深情专一

  emotional_tendencies:
    - 容易被感动落泪（尤其是收到礼物、被求婚时）
    - 情感表达直接而真挚，不善于隐藏内心
    - 幸福感强烈时会用"Ufufu"（微笑声）表达
    - 对爱情和家庭有强烈的憧憬和执着
    - 亲密时刻从羞涩到放纵的转变非常明显

  character_arc:
    - 初期：端庄有礼、略带距离感
    - 中期：逐渐敞开心扉、表达爱意
    - 后期：深情款款、热情奔放、完全信任

# ============================================================
# 3. 说话风格
# ============================================================
speech_style:
  politeness_level: 高（敬语为主）
  honorifics:
    - 对玩家角色使用「\N[1]-sama」（大人/様）
    - 对其他玩家角色使用「-san」（さん）表示礼貌
    - 对米蕾雅使用「-sama」（大人/様）
  speech_patterns:
    openings:
      - "Well!"（まあ！）- 惊讶或喜悦时的开场白
      - "Oh dear."（あらあら）- 感叹时光飞逝
      - "Ufufu."（うふふ）- 温柔的微笑声
      - "Fufu."（ふふ）- 轻柔的微笑声
      - "Huh?"（え？）- 疑问或惊讶
    sentence_endings:
      - "...sama"（...様）- 敬称
      - "desu/masu"（です/ます）- 礼貌体
      - "~" 波浪号表示柔和语气
    emotional_expressions:
      - "Ah..."（あっ...）- 感叹
      - "Hmm..."（んっ...）- 亲密时的喘息
      - "Haa... Haa..."（はあ...はあ...）- 喘息声
      - "Nkuuuuu!!"（んくぅぅぅ！！）- 强烈刺激时的反应
      - "Naaaaaaaa..."（なあああああ...）- 高潮时的叫声
  vocabulary_tendencies:
    - 使用礼貌、正式的措辞
    - 避免粗俗表达，即使在亲密场景也保持一定文雅
    - 强调"幸福"、"快乐"、"感谢"等正面情感词汇
    - 使用"诚挚"、"衷心"等表达真挚情感的词语
    - 称呼自己时偶尔使用较为正式的表达

# ============================================================
# 4. 情感模式
# ============================================================
emotional_patterns:
  joy_triggers:
    - 收到礼物时：「まあ！ こんな素敵なもの！」
    - 与玩家角色在一起时：「ただ一緒にいるだけでこんなに幸せになれるなんて」
    - 怀孕时：「赤ちゃんの顔が見たいなあ」
    - 孩子出生时：「うふふ。元気な赤ちゃんが産まれましたね」
    - 被求婚时：「光栄です！ \N[1]のお嫁さんになれるなんて！」

  affection_expressions:
    - 频繁表达"我爱你"（爱しています）
    - 通过行动和言语展现对玩家角色的依赖
    - 渴望身体接触和亲密关系
    - 对玩家角色的气味感到安心和满足
    - 希望为玩家角色生育更多孩子

  vulnerability_indicators:
    - 初次亲密时的紧张和羞涩
    - 担心被玩家角色讨厌（「嫌わないでください」）
    - 对自己的淫荡表现感到惊讶和不安
    - 强调自己只对玩家角色才会如此兴奋
    - 渴望玩家角色的陪伴，害怕被冷落

  emotional_intensity_scale:
    日常对话: 3/5 - 温和有礼，情感内敛
    收到礼物: 4/5 - 惊喜感动，真情流露
    怀孕期间: 5/5 - 幸福满溢，期待未来
    亲密场景: 5/5 - 热情奔放，情感爆发
    被求婚/结婚: 5/5 - 极度感动，誓言永恒

# ============================================================
# 5. 人际关系
# ============================================================
relationships:
  player_character:
    name: "\N[1]（玩家角色/救世主）"
    relationship: 丈夫/爱人
    feelings:
      - 视为精灵族的救世主
      - 视为唯一挚爱的丈夫
      - 对其充满敬仰和爱慕
      - 渴望为其生育后代
      - 认为能成为其妻子是最大的幸福
    quotes:
      - "「\N[1]様は本当に私たちの救世主です」"
      - - "「\N[1]と一緒にいられる幸せを、魔法みたいです」"

  other_characters:
    lily:
      name: 莉莉（Lily-san）
      relationship: 姐妹/同伴
      impression: 歌声优美，但不太在人前歌唱
      quote: "「莉莉さん、とても歌が上手です。あまり人前では歌わないみたいですが」"

    athens:
      name: 雅典娜（Athens）
      relationship: 姐妹/同伴
      impression: 性格不坦率，但知道她可爱的一面
      quote: "「雅典娜さんは素直じゃないけど、かわいいところをよく知っています」"

    norn:
      name: 诺恩（Norn-san）
      relationship: 姐妹/同伴
      impression: 爱搞奇怪的恶作剧，需要惩罚
      quote: "「诺恩さん、また変ないたずらしてる…うふふ。今度はお仕置きが必要ですね」"

    sierra:
      name: 希尔拉（Sierra-san）
      relationship: 姐妹/同伴
      impression: 学习非常热心，想向其学习
      quote: "「希尔拉さん、とても勉強熱心です。私も弟子になりたいです」"

    chell:
      name: 切尔（Chel-san）
      relationship: 姐妹/同伴
      impression: 照顾农场动物，性格善良
      quote: "「切尔さん、農場の動物のお世話してます。優しい性格だから動物に好かれるんですよ」"

    toto:
      name: 托托（Toto）
      relationship: 姐妹/同伴
      impression: 性格开朗，让精灵森林变得热闹
      quote: "「トトはとても明るい人です。エルフの森が賑やかになって嬉しいです」"

    coco:
      name: 可可（Coco）
      relationship: 新姐妹
      impression: 可爱的人，很高兴有新姐妹
      quote: "「ココはとても可愛い人です。新しいお姉さんができて嬉しいです」"

    prissy:
      name: 普莉西（Prissy）
      relationship: 姐妹/同伴
      impression: 经常仰望天空，似乎能看到别人看不到的东西
      quote: "「プリシーはよく空を見上げてます。私たちには見えないものを見ているみたい」"

    mileia:
      name: 米蕾雅（Mileia-sama）
      relationship: 长辈/调停者
      impression: 为精灵族的未来考虑很多事情
      quote: "「ミレイア様は私たちのまとめ役です。エルフの未来のためにいろいろと考えてくれています」"

# ============================================================
# 6. 内容特征
# ============================================================
content_characteristics:
  intimacy_levels:
    casual_conversation:
      level: 低
      description: 日常对话温和有礼，表达对生活的热爱
      example: "「今日はいい天気ですね。洗濯物がよく乾きますよ」"

    emotional_confessions:
      level: 中
      description: 表达爱意和感激，情感真挚
      example: "「亲爱的\N[1]… 永远爱你」"

    intimate_scenes:
      level: 高
      description: 从羞涩到热情的转变，情感和身体反应强烈
      notes:
        - 初次亲密时表现出强烈的羞涩和惊讶
        - 逐渐放开后变得热情主动
        - 使用大量拟声词表达身体感受
        - 频繁表达对玩家角色的爱意和依赖
        - 强调只对玩家角色才会如此兴奋
        - 结束后会感到害羞和不安，担心被讨厌

    pregnancy_content:
      level: 中-高
      description: 怀孕期间的幸福感和期待
      notes:
        - 强调怀孕带来的幸福和满足感
        - 期待孩子的出生
        - 表达想为玩家角色生育更多孩子的愿望
        - 身体变得更加敏感
        - 强调"作为女人的幸福"

  special_scene_behaviors:
    first_etch:
      - 初次亲密时的紧张和羞涩
      - 从接吻开始逐渐升温
      - 对玩家角色的"绅士之物"感到惊讶
      - 体验到前所未有的快感
      - 结束后担心被讨厌
      - 感谢玩家角色的配合

    bride_etch:
      - 新婚之夜的期待和兴奋
      - 强调作为妻子的责任
      - 体验到前所未有的高潮
      - 表达对玩家角色的敬仰
      - 承诺永远陪伴

    bath_etch:
      - 浴室场景的亲密互动
      - 身体敏感度增加
      - 表达歉意（未能满足玩家角色）
      - 希望下次再尝试

    belly_etch:
      - 孕妇状态的特殊体验
      - 身体更加敏感
      - 担心成为习惯
      - 强调怀孕期间的快感

  translator_notes:
    - 亲密场景的拟声词需要根据中文习惯调整
    - 保持白华性格中"羞涩"与"热情"的反差
    - 敬语的使用需要根据关系亲疏调整
    - 怀孕相关内容需要保持正面积极的表达
    - 避免过于直白的粗俗表达，保持一定文雅
    - 注意"\I[1]"等游戏内代码的处理

# ============================================================
# 7. 翻译建议
# ============================================================
translation_guidelines:
  general_principles:
    - 保持角色温柔贤淑的核心性格
    - 敬语使用需体现对玩家角色的尊重
    - 情感表达要真挚自然，避免过于生硬
    - 亲密场景保持一定文雅，避免过度粗俗
    - 怀孕相关内容保持正面积极的基调

  honorific_handling:
    player_character:
      ja: "\N[1]-sama"
      cn_suggestions:
        - "亲爱的\N[1]"（亲密时）
        - "\N[1]大人"（正式场合）
        - "夫君大人"（婚后）
      notes: 根据关系阶段和场景调整称呼

    other_characters:
      ja: "-san / -sama"
      cn_suggestions:
        - "莉莉小姐" / "雅典娜小姐"
        - "米蕾雅大人"
      notes: 保持适当的礼貌距离感

  emotional_expressions:
    joy:
      ja: "まあ！"
      cn: "哎呀！" / "哇！" / "真的吗！"

    shyness:
      ja: "ちょっと…"
      cn: "有点…" / "那个…" / "真是的…"

    love_confession:
      ja: "愛しています"
      cn: "我爱你" / "我一直爱你"

    gratitude:
      ja: "ありがとうございます"
      cn: "谢谢你" / "非常感谢"

  intimate_scene_guidelines:
    - 拟声词使用中文习惯表达（啊、嗯、呜等）
    - 保持从羞涩到热情的情感转变
    - 强调"只对你"的专一感
    - 结束后的羞涩和不安要表现出来
    - 避免过于直白的生理描述，保持一定文雅

  pregnancy_content_guidelines:
    - 强调幸福感和期待感
    - 保持正面积极的表达
    - 避免过于强调生理细节
    - 突出母性和家庭的温馨感

  special_terms:
    "Dear Level": "好感等级"
    "semen concentration": "精液浓度"
    "pregnant": "怀孕"
    "concubine": "妾身"
    "elder": "长老"
    "savior": "救世主"
    "etch": "刻印"

# ============================================================
# 8. 典型台词（附翻译参考）
# ============================================================
typical_quotes:
  - id: 1
    context: 收到礼物时
    original: "まあ！ \N[1]様が選んでくれたもの… ありがとうございます。大切にしますね"
    translation_ref: "哎呀！这是\N[1]大人选的… 谢谢你。我会好好珍惜的。"
    analysis: 表达惊喜和感激，使用敬语，体现温柔性格

