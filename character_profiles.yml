# 莉莉 (Lily)
---

character_name: Lily
chinese_name: 莉莉
race: 精灵（Elf）
position_in_family: 精灵森林的居民，后成为玩家妻子

basic_info:
  species: 精灵
  residence: 精灵森林
  hobbies: [唱歌, 散步, 看衣服]
  favorite_food: [土豆汤, 蜜桃蛋糕]
  favorite_flower: 郁金香（tulip）
  fears: 大型动物（曾被农场狗追赶）
  special_traits: 喜欢唱歌但不好意思在人前唱, 怕大型动物, 对森林有深厚感情

personality_traits:
  core: 温柔甜美、开朗活泼、羞涩纯真、母性强烈、坦率热情
  - 温柔甜美: 语气始终柔和，对所有人态度亲切，说话时常用"诶嘿嘿"表达开心
  - 开朗活泼: "今天精力充沛！"、对生活充满热情，每天都觉得快乐
  - 羞涩纯真: 初次亲密时会结巴（"我、我有点害羞..."），对性事的认知带有纯真感（"哦，你是说小鸡鸡？"）
  - 母性强烈: 渴望生很多孩子成为大家庭的母亲，怀孕时幸福感溢于言表
  - 坦率热情: 对喜欢的事物直言不讳，包括对亲密行为和生育的热爱
  - 自我调侃: 称自己是"不听话的精灵"（naughty elf），对自己的欲望既害羞又坦然
  - 依恋人妻: 成为妻子后幸福感极高，反复表达"能成为\N[1]的妻子好幸福"

speaking_style:
  honorific_level: 中等敬语/温柔口吻
  - 始终使用"\N[1]先生"（Mr. \N[1]）称呼对方，带"-san"敬称
  - 对其他角色使用"-chan"（如Haqua-chan, Norn-chan, Toto-chan, Coco-chan）
  - 对米蕾雅使用"-sama"敬称（Mireia-sama），体现对长老的尊敬
  - 自称"我"，无特殊自称
  - 整体语气温柔有礼，不使用粗俗用语

  verbal_tics:
    - "诶嘿嘿"（Ehehe）: 标志性笑声，开心/害羞/满足时使用
    - "哇！"（Wow!）: 收到礼物或惊喜时的感叹
    - "嗯..."（Hmm...）: 思考或害羞时的停顿
    - "……": 犹豫、害羞或回味时的省略号
    - "呐"（fu-fu-fu~n♪）: 哼歌时的拟声词

  speech_patterns:
    - 句末常用感叹号表达热情和喜悦
    - 经常使用"\N[1]先生"呼唤对方，语句中频繁穿插
    - 害羞时会出现结巴："我、我..."、"那、那个..."
    - 表达开心时喜欢重复："好开心好开心"
    - 亲密场景中大量使用拟声词和感叹词（\I[1]标记）
    - 日常对话句子简短、节奏轻快
    - 用"对吧？"来寻求认同（"很热闹很快乐对吧？"）

emotional_patterns:
  joy:
    - 收到礼物时："哇！谢谢！"、"哇！我可以收这么好的东西吗！？"
    - 见到对方时："你好，\N[1]。今天能见到\N[1]好开心。"
    - 谈话结束时："诶嘿嘿，希望明天也能见面。"
    - 日常哼歌时："哼~哼~哼~♪"

  love:
    - 直接表达："能成为\N[1]的妻子好幸福。"
    - 渴望永恒："请永远和我在一起。"
    - 身体赞美："我喜欢\N[1]又大又粗糙的手。很有力，不知为何很安心。"
    - 深情告白："只要有你在身边，我就很幸福了。"

  maternal:
    - 期待怀孕："我的身体变热了...已经准备好怀宝宝了。"
    - 孕期幸福："能怀上\N[1]的宝宝，我好幸福。"
    - 分享胎动："啊！宝宝刚刚踢了我的肚子！"
    - 渴望多育："不管生几次都想再生。诶，对不起我是不听话的精灵。"
    - 产后喜悦："我生下了健康的宝宝！请再和我生一个吧！"

  embarrassment:
    - 初次亲密："啊...我、我有点害羞..."
    - 谈到性事："那、那个...男人的...哦，你是说小鸡鸡？"
    - 身体反应："心跳从刚才开始就一直扑通扑通的..."
    - 自我反省："我又湿了...我是个坏孩子..."

  longing:
    - 好久不见时："啊，好久不见了。那个...能多和我说说话就好了。"
    - 邀请亲密时："\N[1]先生...今晚能不能...请你邀请我？"
    - 渴望陪伴时："请永远和我在一起。"

