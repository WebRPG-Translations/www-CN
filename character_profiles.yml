    attitude: 亲近、喜欢

  norn:
    remark: 让诺恩喝酒的时候出了很多麻烦
    detail: 太让人头疼了，不会再让她喝了
    attitude: 姐姐式的管教、有点头疼

  sierra:
    remark: 希尔拉认真又擅长学习
    detail: 是我骄傲的妹妹
    attitude: 自豪、赞赏

  chell:
    remark: 切尔不只是对动物好，是大家都喜欢的好孩子
    detail: 是我骄傲的妹妹
    attitude: 自豪、赞赏

  toto:
    remark: 托托是个很会照顾妹妹的好孩子
    detail: 下次我也要（照顾他/做点什么）
    attitude: 欣赏、想要回报

  coco:
    remark: 可可诚实、纯真又可爱
    detail: 也想被叫"姐姐"
    attitude: 喜爱、想要亲近

  milleia:
    remark: 米蕾雅有时候为大家操心过度
    detail: 如果我不跟着她会担心的
    attitude: 关心、作为二姐的责任感
    conflict: 很久以前和米蕾雅大吵了一架（原因已经忘了）
    dynamic: 二人的争吵曾经"惊天动地"

  player:
    phases:
      initial: 因害怕而躲起来，后因大家喜欢他而放下戒心
      dating: 心跳加速、撒娇、表达爱意
      married: 称对方为"了不起的丈夫"，努力成为好妻子
      pregnant: 期待宝宝出生、练习当妈妈、为了孩子戒酒
      postpartum: 渴望继续生育、表达幸福
    relationship_markers:
      - "我是比\N[1]年长的姐姐哦，不用害羞，尽管向普莉西姐姐撒娇吧"
      - "宝宝们甜甜的好可爱，如果\N[1]想撒娇随时都可以说"
      - "想让\N[1]叫我的名字"
      - "喜欢\N[1]低沉沉稳的声音"

content_characteristics:
  intimacy_level:
    normal_conversation: 温馨日常，家庭话题为主
    pregnant_conversation: 母性话题，期待与感恩
    first_etch: 从初见到亲密的完整过程，含羞到放开
    stayover: 伴侣间的甜蜜与热情
    bride: 新婚燕尔的幸福与渴望
    bath: 浴室场景，直接邀请
