      observation: "Athens喝茶不加任何东西，有自己的坚持"
      attitude: "尊重其个性"
    hakua:
      nickname: "Hakua（白华）"
      relationship: "同伴"
      observation: "帮她缝过快要掉的扣子，什么都会做，像母亲一样"
      attitude: "敬爱，视其为母亲般的存在"
    norn:
      nickname: "Norn（诺恩）"
      relationship: "同伴"
      observation: "经常邀请她一起玩，其实挺寂寞的"
      attitude: "关心，温柔地洞察其内心"
    sierra:
      nickname: "Sierra（希尔拉）"
      relationship: "同伴"
      observation: "Sierra喜欢看字很多的难懂的书，自己更喜欢图画多的书"
      attitude: "友好对比，不嫉妒"
    toto:
      nickname: "Toto（托托）"
      relationship: "同伴"
      observation: "感觉Toto经常瞪自己，不知道是不是做了什么"
      attitude: "困惑、不安，会自我反省"
    coco:
      nickname: "Coco（可可）"
      relationship: "同伴"
      observation: "Coco像妹妹一样可爱，想摸摸她，但怕Toto生气"
      attitude: "姐姐般的疼爱"
    prissy:
      nickname: "Prissy（普莉西）"
      relationship: "同伴"
      observation: "Prissy经常一边看夜空一边喝酒，有点成熟帅气"
      attitude: "崇拜其成熟气质；担心她一直关在房间里会生病"
    mileia:
      nickname: "Mileia-sama（米蕾雅大人）"
      relationship: "上级 / 尊敬对象"
      observation: "能从异世界召唤人类，很厉害"
      attitude: "尊敬、崇拜"

  # ── 6. 内容特征 ──────────────────────────────────────
  content_characteristics:
    intimacy_level: "渐进式——从纯真日常到高度亲密"
    intimacy_progression:
      - stage: "日常对话"
        level: "无亲密内容"
        description: "纯聊天，分享生活趣事和对同伴的观察"
      - stage: "送礼/好感提升"
        level: "低"
        description: "表达开心和感谢，有轻微的撒娇"
      - stage: "第一次刻印"
        level: "高"
        description: "初体验场景，从紧张害怕到逐渐享受，全程害羞"
      - stage: "第一次留宿"
        level: "高"
        description: "主动提出想要孩子，亲密行为持续整夜"
      - stage: "新娘刻印"
        level: "极高"
        description: "婚后场景，语言更加大胆直白，表达强烈的生育渴望和臣服感"
      - stage: "浴室刻印"
        level: "高"
        description: "较为简短的亲密场景，主动邀请"
    emotional_intensity_in_intimate_scenes:
      - "始终保留害羞感——即使在最亲密的时刻也会说'恥ずかしい（好害羞）'"
      - "快感表达从犹豫到坦诚：初期'变にされた（被弄得好奇怪）'→后期'気持ちいい（好舒服）'"
      - "对'被注视'有特殊反应——既羞耻又兴奋"
      - "将性行为框架为'交尾（mating）'——从动物世界借来的概念，保持天真感"
    special_scene_behaviors:
      first_etch:
        - "对裸露感到意外的害羞（平时在精灵面前裸露不在意）"
        - "用动物（兔子）的交配行为理解即将发生的事"
        - "从'好大...'的惊讶到'好舒服...'的接受，情感转变自然"
        - "事后第一反应是问'我没问题吧？'——强烈的自我确认需求"
      bride_etch:
        - "使用'妻のマンコ（妻子的小穴）'等带有归属感的词汇"
        - "主动要求'像野兽一样'、'用本能交配'——从害羞到主动的完整弧线"
        - "将生育与爱情完全绑定：'用○○的精液让我怀孕'"
      sleepover_sex:
        - "半推半就的表达——'もう...○○くんの意地悪！（不要...○○好坏！）'后接'子供が欲しい...（我想要孩子...）'"
        - "持续整夜的暗示，体现精灵的体力优势"
        - "事后表达：'○○くんので...お腹いっぱい...（被○○的...灌满了肚子...）'"
    fertility_theme:
      - "贯穿始终的生育渴望，是角色核心驱动力之一"
      - "将生育视为爱情的最高表达"
      - "精灵种族的繁衍使命感"

  # ── 7. 翻译建议 ──────────────────────────────────────
  translation_guidelines:
    general_principles:
      - "保持天真直白的语气，避免过度文艺化或成人化"
      - "感叹词要保留并本土化：えっ→诶、わあ→哇、あっ→啊"
      - "'えへへ'统一译为'诶嘿嘿'，是角色标志性笑声"
    honorific_handling:
      - "保留'○○くん'的称呼方式，译为'○○'或'○○君'均可，但需全文统一"
      - "'Mileia-sama'译为'米蕾雅大人'"
    key_term_translation:
      - term: "交尾 (mating)"
        suggested: "交配"
        note: "保持动物学色彩，符合角色将亲密行为类比动物的思维模式"
      - term: "赤ちゃんを作る"
        suggested: "造小宝宝 / 生孩子"
        note: "保留天真直白的口吻"
      - term: "エッチ (etch)"
        suggested: "根据上下文译为'亲密行为'或'那个'"
        note: "角色本身不用这个词，但事件标签中含有此词"
      - term: "おちんちん"
        suggested: "根据场景译为'那个'或直接译为'肉棒'"
        note: "第一次刻印时角色使用幼儿化词汇，体现天真感；后期场景中可适当成人化"
      - term: "気持ちいい"
        suggested: "好舒服 / 好舒服啊"
        note: "亲密场景中的核心感叹，保持自然口语感"
    intimate_scene_guidelines:
      - "保留害羞感——即使译文露骨也要让读者感受到角色的羞涩"
      - "拟声词本土化：んっ→嗯、あっ→啊、はぁっ→哈啊"
      - "语尾重复要保留，这是情绪递进的重要手段"
      - "不要将角色的天真语气替换为成熟的色情化表达"
      - "'恥ずかしい'系列翻译要保持一致：'好害羞'或'好羞耻'"
    common_pitfalls:
      - "切忌将切尔翻译成成熟魅惑型角色——她的魅力在于天真与热情的反差"
      - "不要省略自我质疑的台词（'没问题吧？''不奇怪吧？'），这是角色标志性心理"
      - "动物类比要保留，这是角色世界观的核心"
      - "感叹号和省略号的使用要忠实于原文的情感密度"

  # ── 8. 典型台词 ──────────────────────────────────────
  representative_lines:
    - original: "○○くんのこと好きだよ！ずっと友達でいよう！"
      translation_ref: "我喜欢○○哦！永远做好朋友吧！"
      context: "日常对话——表达爱意的直球方式，天真无邪"
      significance: "体现角色坦率直接的告白风格"

    - original: "○○くんとお話しするのは楽しい！○○も楽しかった？"
      translation_ref: "和○○聊天好开心！○○也开心吗？"
      context: "日常对话——对话结束时的确认"
      significance: "体现角色在意对方感受、习惯性自我确认的特点"

    - original: "え、えへへ…なんか恥ずかしい…"
      translation_ref: "呃、诶嘿嘿…总觉得好害羞…"
      context: "第一次刻印——被看到裸体时"
      significance: "标志性害羞反应，'诶嘿嘿'是角色专属笑声"

    - original: "もう…○○くんの意地悪！…わかりました…"
      translation_ref: "不要…○○好坏！…我知道了啦…"
      context: "第一次留宿——半推半就答应亲密请求"
      significance: "体现撒娇型拒绝后的软化，是角色情感模式的典型"

    - original: "恥ずかしい…恥ずかしいけど…気持ちいい…"
      translation_ref: "好害羞…虽然害羞…但是好舒服…"
      context: "亲密场景中的核心矛盾表达"
      significance: "害羞与快感的并存是切尔在亲密场景中最核心的情感特征"

---
# 托托 (Toto)
---

character_name: Toto
character_name_cn: 托托
analysis_version: "1.0"
analyst_note: >
  本文本来源于已发行商业游戏的本地化翻译工作，属于标准软件本地化流程。
  以下分析如实反映角色在游戏文本中的语言特征，供翻译团队准确还原角色形象使用。

# ============================================================
# 1. 基本信息
# ============================================================
basic_info:
  race: 暗黑精灵（Dark Elf）
  origin: 沙漠村落（与妹妹可可一同离开故乡，迁居至精灵之森）
  family:
    - 妹妹: 可可（Coco）——托托最为珍视的家人
  marital_status: 已婚（与玩家角色结为夫妻）
  current_residence: 精灵之森
  notable_traits:
    - 性格天真烂漫，思维简单直率
    - 热爱食物，尤其喜欢洋葱汤和梨子蛋糕
    - 对生育充满热情，视"增加暗黑精灵人口"为己任
    - 战斗能力不弱，曾被评价为"相当厉害的家伙"（切尔语）

# ============================================================
# 2. 性格特征
# ============================================================
personality:
  core_traits:
    - 天真无邪: >
        对世界充满好奇心，对许多事物的认知停留在孩童般的层面。
        例如对"Ochinchin"（男性生殖器）感到困惑，天真地问
        "平时那么大，到底藏在哪里？"
    - 开朗乐观: >
        始终保持积极情绪，极少表现出消沉。即使面对艰苦的旅途也能
        感叹"能平安到达精灵之森真是太好了！"
    - 直率坦诚: >
        情感表达毫无保留，喜欢就说"喜欢"，开心就说"开心"，
        从不掩饰或委婉表达。
    - 重视亲情: >
        对妹妹可可有着强烈的保护欲，明确表示"如果你让可可哭了，
        我不会原谅你的"。
    - 贪吃好吃: >
        对食物有极大的热情，多次提及喜欢的食物，甚至为肚子变大
        找借口说"都怪森林里的食物太好吃了"。
    - 单纯轻信: >
        诺恩送她一个打开后飞出虫子的盒子，她虽然吓了一跳但仍然
        怀疑"说不定是珍稀虫子？"
  emotional_tendencies:
    - 情绪外露，喜怒形于色
    - 容易害羞但不会逃避
    - 对亲密行为感到困惑但并不排斥
    - 害怕被冷落，会主动询问"你是开始讨厌托托了吗？"

# ============================================================
# 3. 说话风格
# ============================================================
speaking_style:
  self_reference: "托托"（第三人称自称，从不使用"我"）
  formality: 零敬语——完全不使用敬语，语气极其口语化、童稚化
  speech_patterns:
    - 第三人称贯穿: >
        全部台词均以"托托"替代第一人称，如"托托也很开心！"、
        "托托最喜欢\N[1]了！"。这是该角色最核心的语言标记。
    - 句末语气词丰富: >
        大量使用"呀！""哟！""呢..."等感叹语气词，表达情绪的
        直接性。
    - 重复强调: >
        喜欢用重复的方式加强语气，如"好开心！好开心！"、
        "不行了...不行不行"、"去了...去了...去了"。
    - 拟声词频繁: >
        亲密场景中大量使用拟声词/拟态词（Nguuuuuu、Penchin、
        Jupojupo、Goryugoryu等），表现身体感受的直接反馈。
    - 疑问句天真化: >
        疑问句往往带着孩童般的好奇口吻，如"这个能吃吗？"、
        "到底藏在哪里呀？"
  vocabulary_level: 幼稚——用词简单，词汇量有限，避免复杂句式
  honorific_usage:
    - 自称"托托"（无敬语）
    - 对可可被称为"托托姐姐"（Toto-oneechan），这是可可对她的称呼
    - 对其他玩家角色直呼其名，不加敬称
  dialect_markers:
    - 无明显方言特征，但语言带有"沙漠村落出身"的朴素感

# ============================================================
# 4. 情感模式
# ============================================================
emotional_patterns:
  joy_expression: >
    极其外放。开心时直接说出"好开心！"、"太棒了！"，配合感叹号
    和重复来强化情绪。
  affection_expression: >
    直白热烈。"托托最喜欢\N[1]了！"、"想和\N[1]永远在一起！"
    毫不含蓄，是纯粹的情感流露。
  anxiety_expression: >
    直接提问。如"\N[1]，你是开始讨厌托托了吗？"，不安时会
    主动寻求确认，不会自己默默承受。
  surprise_expression: >
    夸张的惊叫。"诶！？""哇！？"配合强烈的语气词。
  pain_discomfort: >
    亲密场景中通过拟声词和反复的"不行"表达，但并非真正的拒绝，
    而是身体感受超出认知的不知所措。
  curiosity: >
    对未知事物表现出孩童般的探索欲，如对身体变化、生育过程、
    新食物等都充满疑问。
  attachment_style: >
    依恋型——极度重视与\N[1]的关系，害怕被抛弃，
    渴望陪伴和关注。

# ============================================================
# 5. 人际关系
# ============================================================
relationships:
  player_character:
    name: "\N[1]（玩家角色）"
    relationship: 丈夫/伴侣
    attitude: >
      最深的爱慕与依赖。视玩家为生命中最重要的存在（"在来森林之前，
      扗托只有可可一个人...但现在有\N[1]在！"）。对亲密行为持积极
      态度，但初期因缺乏经验而困惑。婚后更加坚定，发誓"一生都会
      让你幸福"。
  coco:
    name: 可可（Coco）
    relationship: 妹妹
    attitude: >
      最珍视的家人，有强烈的保护欲。"可可是托托宝贵的妹妹！""如果你
      让可可哭了，我不会原谅你。"同时也有依赖的一面，承认"托托一个人
      根本到不了这片森林"。
  lily:
    name: 莉莉（Lily）
    relationship: 同伴
    attitude: 感激。"莉莉帮托托她们打扫了房间！莉莉是个好人！"
  athens:
    name: 雅典娜（Athens/Athene）
    relationship: 同伴
    attitude: >
      带有善意的评价。"雅典娜虽然有点固执，但是个好人！托托喜欢她！"
  haqua:
    name: 白华（Hakua/Haqua）
    relationship: 同伴
    attitude: >
      敬仰。"白华像妈妈一样，让人安心！托托也想成为白华那样的人。"
  norn:
    name: 诺恩（Norn）
    relationship: 同伴
    attitude: >
      天真的互动。收到诺恩送的盒子，打开飞出虫子，但仍善意地猜测
      "虽然吓了一跳，但说不定是珍稀虫子？"
  sierra:
    name: 希尔拉（Sierra）
    relationship: 同伴
    attitude: >
      关心但有些无奈。"希尔拉很努力。但她老问我沙漠小镇的事，有点
      招架不住。"
  chell:
    name: 切尔（Chell）
    relationship: 同伴
    attitude: 欣赏。"切尔是个相当厉害的家伙！想跟她认真打一场！"
  prissy:
    name: 普莉西（Prissy）
    relationship: 同伴
    attitude: >
      善意。"普莉西好像很喜欢喝酒！想让她尝尝沙漠村子里传承的秘酿酒！"
  milleia:
    name: 米蕾雅（Milleia）
    relationship: 长辈/尊敬之人
    attitude: >
      尊敬。"米蕾雅是这片森林的长老。给过托托很多食物，所以当然很了不起！"

# ============================================================
# 6. 内容特征
# ============================================================
content_features:
  intimacy_level: >
    高——角色在亲密场景中有大量直接的身体描写和感受表达。
    但她的态度始终保持天真单纯，将"造孩子"视为一件美好的事情。
  emotional_intensity: >
    极高——无论是日常对话还是亲密场景，情感表达都非常饱满，
    大量使用感叹号、重复、拟声词来强化感受。
  special_scenes:
    first_etch:
      description: >
        刻印场景展现了从困惑到接受的过程。初期紧张害怕（"托托姐姐，
        你好紧张..."），中期因身体反应而困惑（"碰过之后身体变热了，
        感觉好奇怪..."），后期逐渐享受但仍有认知落差（"这就是造孩子...
        太厉害了..."）。
      tone: 从紧张到困惑再到惊喜
    sleepover_sex:
      description: >
        过夜场景中托托表现出竞争意识（"先去的人算输！"）和充沛的体力，
        将造孩子视为一种"比赛"，但最终还是败下阵来（"托托输了..."）。
      tone: 活泼、竞争、最终温柔
    bride_etch:
      description: >
        婚后场景中情感最为饱满，结合了对婚姻的喜悦和对亲密行为的享受。
        结尾的独白是角色最深层的情感流露——对过去孤独的回忆和对现在幸福的感恩。
      tone: 幸福、感恩、深层情感流露
    bath_etch:
      description: >
        浴室场景相对简洁，托托主动提议"要不要就这样造个孩子"，
        展现了她对亲密行为的积极态度。
      tone: 轻松、主动
    pregnant_conversation:
      description: >
        怀孕期间的对话充满了对新生命的期待和喜悦，但也包含天真无知的
        面（对身体变化的困惑）。多次提到"暗黑精灵要增加了"，
        将生育与种族延续联系起来。
      tone: 期待、喜悦、自豪
  translator_notes:
    - >
      托托的"天真"不等于"愚蠢"——她是对世界充满好奇的单纯，
      而非智力低下。翻译时应把握"可爱的天真"而非"令人厌烦的傻气"。
    - >
      亲密场景中的拟声词翻译需要统一标准，建议在团队内建立一份
      托托专用的拟声词词汇表。
    - >
      "造孩子"（baby making）是她对性行为的主要认知框架，
      翻译时应保留这种天真化的表达，避免过于直白的成人用语。
    - >
      托托对"Ochinchin"的困惑独白（第131-132行）在翻译时需要
      保留天真语气，使其成为有趣的角色刻画而非低俗笑话。
    - >
      怀孕相关台词（第2、3、20行等系统提示文本）为系统层面文本，
      需与角色对话文本的翻译风格保持一致。

# ============================================================
# 7. 翻译建议
# ============================================================
translation_guidelines:
  self_reference:
    rule: >
      始终以"托托"替代第一人称代词。这是该角色最核心的语言标记，
      绝不可翻译为"我"。
    examples:
      - en: "Toto is happy!"
        cn: "托托好开心！"
      - en: "I love \N[1]"
        cn: "托托最喜欢\N[1]了！"
  tone_calibration:
    rule: >
      整体语气应保持幼齿、活泼、口语化。避免使用书面语或成熟化的
      表达方式。可适当使用"呀""哟""呢"等语气助词来还原童稚感。
  repetition_handling:
    rule: >
      原文中的重复表达（如"no no no"、"going going going"）应保留，
      这是角色情绪强度的体现。可适当使用叠词或重复句式。
  honorific_notes:
    rule: >
      托托不使用敬语。即使对长老米蕾雅也只是用"了不起"来表达尊敬，
      而非使用敬语体系。翻译时避免添加"您""大人"等敬称。
  intimate_scene_notes:
    rule: >
      托托在亲密场景中仍保持天真语气，将身体感受用最直白的方式
      表达出来。翻译时应保持这种"不谙世事"的感觉，使用简单的
      感受描述而非成人化的色情用语。
  system_text_notes:
    rule: >
      系统提示文本（如"Dear Level不足""怀孕中无法赠礼"等）虽然
      不是角色台词，但与角色体验直接相关，翻译时应简洁明了。
  onomatopoeia_guidelines:
    rule: >
      日语拟声词需要根据中文习惯进行本地化转换，但需保持一致的
      风格。建议建立专用术语表。
    suggestions:
      - "Nguuuuu → 嗯嗯嗯嗯"
      - "Penchin → 啪唧啪唧"
      - "Jupojupo → 啾噗啾噗"
      - "Goryugoryu → 咕噜咕噜"

# ============================================================
# 8. 典型台词（附翻译参考）
# ============================================================
typical_lines:
  - id: 1
    original: "Toto had a lot of fun!"
    reference_translation: "托托玩得好开心呀！"
    context: 日常对话——展现开朗天真的核心性格
    analysis: >
      最基础的托托式表达：第三人称自称 + 直接的情感表达 +
      感叹号。翻译时保持"托托"自称和活泼语气即可。

  - id: 2
    original: "Coco is my precious little sister! I won't forgive you if you make Coco cry!"
    reference_translation: "可可是托托宝贵的妹妹！如果你让可可哭了，托托不会原谅你的！"
    context: 日常对话——展现对妹妹的保护欲
    analysis: >
      这是托托少有的严肃时刻，语气中带有明确的警告意味。
      但"my precious little sister"的表达方式仍然简单直接，
      翻译时保留这种"用最简单的话表达最强烈的情感"的特点。

  - id: 3
    original: "Before coming to this forest, there was only Coco in Toto... But now \N[1] is here! Everyone else is here! Toto is very, very happy!"
    reference_translation: "在来这片森林之前，托托身边只有可可...但现在有\N[1]在！大家都在！托托真的...真的好幸福！"
    context: 婚后场景——角色最深层的情感流露
    analysis: >
      这段独白揭示了托托的内心世界：曾经的孤独（只有可可）与
      现在的幸福形成对比。"very, very happy"的重复翻译为
      "真的...真的"可以保留情感的层次感。这是展现角色深度的
      关键台词。

  - id: 4
    original: "Ochinchin is strange. It's so big when you're pregnant, where do you usually keep it?"
    reference_translation: "小鸡鸡好奇怪呀。明明造孩子的时候那么大，平时都藏在哪里了？"
    context: 日常对话——展现天真无知的好奇心
    analysis: >
      这句话完美体现了托托的天真特质：她对性有基本的认知（知道
      与怀孕有关），但对其运作方式完全无知。翻译时需要保持这种
      "天真好奇"的语气，避免显得低俗或做作。

  - id: 5
    original: "\N[1]! The one who goes first loses!"
    reference_translation: "\N[1]！先去的人算输哦！"
    context: 过夜场景——展现活泼的竞争意识
    analysis: >
      托托将亲密行为视为一场"比赛"，展现了她天真烂漫的世界观。
      简单直接的表达方式，翻译时保持口语化和游戏感。

