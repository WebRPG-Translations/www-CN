      对主人公始终使用敬称"Mr. \N[1]"（对应日语的"\N[1]さん"），
      即使在婚后、亲密场景中也保持这一称呼。
      对其他角色也使用"-san"的敬称（Hakua-san, Norn-san, Toto-san, Coco-san）。
      只有对米蕾雅使用"Miss/Milleia"的更高敬称，体现对长老的尊重。
      对切尔（Chell）不加敬称，因为年龄最接近，关系较亲。
  verbal_tics:
    - 结巴犹豫: "Um..."、"Th-this!"、"Well..." 开头频率极高，体现害羞性格
    - 省略号停顿: 大量使用"..."，表现思考中的犹豫、话语未尽、或情感涌动时的欲言又止
    - 书本引用: "书上说..."、"据说..."、"这是..."，习惯性引用知识作为论据
    - 学术化表达: 即使描述亲密感受也会用"机制"、"生存本能"、"分泌"等术语
    - 呢喃低语: 在亲密场景中用反复的"嗯..."、"啊..."表现沉溺
  vocabulary_style:
    - 用词文雅端正，不做粗俗表达
    - 即使在极度亲密的场景中，也会先用理性语言描述，再逐渐失控
    - 喜欢用比喻和类比来解释感受
    - 表达爱意时含蓄而真诚："我...很幸福"、"这是第一次这么幸福"
  address_forms:
    protagonist: "Mr. \N[1]"（婚后不改口，始终带敬称）
    lily: "Lily"（不加敬称，观察性描述）
    athena: "Athena"（赞赏其茶道知识）
    hakua: "Hakua-san"（仰慕，"很有气质、很漂亮、好香..."）
    norn: "Norn-san"（亲近但带敬称）
    chell: "Chell"（最亲近，不加敬称，描述为"精力充沛、开朗，和我完全相反"）
    toto: "Toto-san"（好奇异文化）
    coco: "Coco-san"（教导关系，有老师的感觉）
    prissy: "Miss Prissy"（了解其藏酒和闭门读书的习惯）
    milleia: "Milleia"（用敬称，尊为精灵长老）

# ============================================================
# 4. 情感模式
# ============================================================
emotional_patterns:
  happiness:
    triggers: 收到礼物、与主人公交谈、婚后生活、怀孕、想象精灵的未来
    expression: 温和的笑容，"我很幸福"，幸福感含蓄但真挚
  embarrassment:
    triggers: 初次亲密接触、被给予亲密礼物、被告白
    expression: 频繁结巴、脸红心跳、用书本知识来回避直面感受
    example: "Th-, embarrassed lines like this in a love story... I never thought the day would come when I would be able to eat it myself."
  longing:
    triggers: 长时间未见面、独处时想起主人公
    expression: "我以为你把我忘了"、读书时无法集中注意力、身体发热
    example: "Even if I read a book, I can't concentrate very much, and my thoughts are often unorganized..."
  rationalization:
    pattern: |
      面对无法用理性解释的感受时，她会先尝试用书本知识或学术分析来理解，
      然后发现"书上没写过这个"，最终被迫接受感性认知。
      这是她最核心的情感处理模式，贯穿初吻到婚后。
    example: "This is not written in the book..."
  overwhelm:
    triggers: 极致快感、被深爱
    expression: 从理性分析彻底崩溃为纯感官的呢喃，"我要变笨了"、"除了那个什么都想不了"
    pattern: 理性防线被快感击穿是她H场景的核心戏剧张力
  maternal:
    triggers: 怀孕、感受到胎动
    expression: 温柔幸福，"感受到胎动"、"想要你快点出来"、将生育与精灵存续联系
  guilt_vs_desire:
    pattern: |
      内心纠结：理智告诉她"这样很危险"、"会变笨"，但身体和情感驱使她无法停止。
      她用"为了精灵族的繁荣，这是义务"来合理化自己的欲望，
      但逐渐承认"不仅仅是义务，我也想和你在一起"。

# ============================================================
# 5. 人际关系
# ============================================================
relationships:
  protagonist:
    relation: 恋人 → 妻子
    tone: 始终保持敬称，从害羞到坦诚到放纵
    key_points:
      - 初期好奇对方的世界，后来发展为深深的依恋
      - "我觉得我是为了遇见你而生的"
      - 婚后依然叫"Mr. \N[1]"，是角色坚持的温柔
      - 从"这是义务"到"不仅仅是义务"的转变是感情线的核心
  lily:
    impression: "看到Lily反穿衣服走来走去，是最近的流行吗？"
    tone: 好奇观察，略带困惑
  athena:
    impression: "Athena对茶很有研究，我经常向她学习"
    tone: 学习者姿态，尊敬
  hakua:
    impression: "Hakua-san很有气质、很漂亮、好香...我真的很仰慕"
    tone: 仰慕憧憬，带少女式的羡慕
  norn:
    impression: "Norn-san时不时来借我的书，但好像没读完过。是容易厌倦吗？"
    tone: 亲近中带一点小困扰
  chell:
    impression: "Chell和我年龄最接近，她精力充沛又开朗，和我完全相反"
    tone: 亲近友好，认为彼此互补
  toto:
    impression: "我在向Toto-san他们询问沙漠村落的事情，生活方式的差异很有趣"
    tone: 好学者的求知欲
  coco:
    impression: "应Coco-san的请求在教她，有一点当老师的感觉"
    tone: 温和的师生关系
  prissy:
    impression: "Prissy好像喜欢红酒，据说在房间里藏了陈年佳酿。好像不出来房间了..."
    tone: 了解但不深入，观察者视角
  milleia:
    impression: "Mileia是精灵长老，她知道很多我不知道的古老事情，我尊敬她"
    tone: 最高敬意，发自内心的尊重

# ============================================================
# 6. 内容特征
# ============================================================
content_features:
  intimacy_progression:
    stage_1_first_kiss:
      description: 初吻前引用书中"营造气氛"的知识，笨拙但认真
      turning_point: 发现"书上没写过这个"，身体反应超出理性预期
    stage_2_first_etch:
      description: 初次性行为，从恐惧到震惊到沉溺
      turning_point: 从"这应该很痛"到"不痛，只是舒服"的认知颠覆
    stage_3_sleepover:
      description: 第一次留宿，独处时已经会主动想念，身体开始不听使唤
      turning_point: "这是你的错...请负责"——从被动到主动的转变
    stage_4_bride:
      description: 新婚之夜，语言更加大胆直白，彻底放下了羞耻心
      turning_point: "是你的错，我变成了喜欢生孩子的色情精灵"
    stage_5_bath:
      description: 浴室场景，已经是老夫老妻的自然邀请
      tone: 温馨自然，少了初期的羞涩
    stage_6_pregnant_belly:
      description: 孕期亲密，明知是孕期也无法抗拒快感
      tone: 母性与欲望的交织
  emotional_intensity_curve: |
    初次(震惊+好奇) → 留宿(思念+渴望) → 新婚(幸福+放纵) → 浴室(自然+温馨) → 孕期(母性+沉溺)
    整体趋势：从极度克制到逐渐解放，但始终保留"精灵少女"的底色
  special_scene_notes:
    - 初次场景中的"书本知识 vs 实际体验"对比是角色最重要的叙事手法
    - "我要变笨了"是贯穿多个H场景的重复意象，代表理性被快感击溃
    - 婚后场景中"我被你变成了..."句式体现了角色成长的自我认知
    - 孕期对话将"胎动"、"母性"与亲密场景并置，是特殊的情感层次
  translator_notes:
    - 她的理性崩溃过程需要逐层递进，不能一上来就放纵
    - "书上说..."这个口头禅在H场景中的出现/消失是重要的翻译标记
    - 结婚前后的敬称不变是角色特征，不能改成昵称
    - "我要变笨了"是翻译中需要保持一致的关键短语
    - 孕期对话需要区分"母性的温柔"和"欲望的失控"两种语气
    - 她对精灵族繁衍的使命感需要与个人情感并重，不能只写成工具人

# ============================================================
# 7. 翻译建议
# ============================================================
translation_guidelines:
  general_tone: |
    希尔拉的翻译基调是"文静知性中带害羞"。
    她说话像一个读了很多书但缺乏社交经验的少女，
    习惯用知识武装自己，但内心柔软且容易害羞。
    敬称"Mr."统一翻译为"\N[1]先生"或根据上下文用"\N[1]大人"，
    但不要去掉敬称——这是角色标志。
  honorifics:
    rule: |
      "Mr. \N[1]" → "\N[1]先生"（贯穿全文，包括婚后和H场景）
      "-san" → "小姐/先生"根据语境
      "Miss" → "小姐"
      不要将婚后称呼改成"老公"或昵称，保持敬称是角色设定的一部分
  stammering:
    rule: |
      "Um..." → "那个..."、"唔..."
      "Th-this!" → "这、这个！"
      "Well..." → "嗯..."
      结巴的程度应随场景递进：日常对话轻度结巴，亲密场景初期重度结巴，后期减少
  bookish_speech:
    rule: |
      她引用知识时的语气应保持"认真科普"的感觉，不能太口语化
      "It said to create a mood for intercourse" → "书上说要先营造气氛..."
      "mechanism for leaving offspring" → "留下后代的机制"
      但当她被快感淹没时，这些学术语言会逐渐消失，转为本能的呢喃
  h_scene_progression:
    rule: |
      第一阶段（初次）：大量结巴+理性分析+震惊，"书上说..."频繁出现
      第二阶段（留宿）：少结巴，多思念+渴望，开始主动
      第三阶段（新婚）：大胆直白，但仍保留"先生"敬称，幸福与放纵并存
      第四阶段（浴室/孕肚）：自然温馨，偶尔害羞，更多的是坦然
  key_phrases:
    - original: "I'll definitely become an idiot"
      translation: "我一定会变笨的"
      note: 贯穿多个场景的核心短语，表现理性被快感击溃
    - original: "It's Mr. \N[1]'s fault"
      translation: "都是\N[1]先生的错"
      note: 撒娇式的归咎，实际是爱意表达
    - original: "I was born to meet you"
      translation: "我觉得我是为了遇见你而生的"
      note: 婚后最深情的告白
    - original: "I've become a horny elf who loves making babies"
      translation: "我变成了喜欢生孩子的色情精灵"
      note: 自我认知转变的关键台词
    - original: "Not only that, I... with Mr. \N[1]..."
      translation: "不仅仅是那样...我...和\N[1]先生..."
      note: 从义务到爱情的转折点，欲言又止
    - original: "This is not written in the book"
      translation: "书上没有写过这个..."
      note: 理性防线被突破的标志性台词

# ============================================================
# 8. 典型台词
# ============================================================
typical_lines:
  - id: 1
    original: "I like reading books. My favorite stories are interesting no matter how many times I read them."
    context: 日常对话，展示书痴本性
    translation: "我喜欢读书。最喜欢的故事不管读多少遍都很有趣。"

  - id: 2
    original: "Is this the effect of a kiss? My heart is pounding... my cheeks are hot..."
    context: 初吻后，用书本知识无法解释身体反应
    translation: "这就是接吻的效果吗...心跳好快...脸颊好烫..."

  - id: 3
    original: "I didn't think sexual intercourse was this dangerous... If I keep doing this, I'll definitely become an idiot."
    context: 初次H后，理性总结式发言
    translation: "没想到性行为这么危险...再这样下去，我一定会变笨的..."

  - id: 4
    original: "I think I was born to meet you."
    context: 新婚之夜，最深情的告白
    translation: "我觉得...我是为了遇见你而生的。"

  - id: 5
    original: "Not only that, I... with Mr. \N[1]... Please, thank you for your continued support."
    context: 留宿后，从"义务"转向"爱情"的转折，最后用客套话掩饰真心
    translation: "不仅仅是那样...我...和\N[1]先生在一起...今后也请多多关照。"
    translator_note: 最后半句的"请多多关照"表面是客套，实际是含蓄的告白——请继续和我在一起。

