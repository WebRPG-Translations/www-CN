# 雅典娜 (Athens)
---

character_name: Athens
chinese_name: 雅典娜
race: 精灵（Elf）
position_in_family: 姐妹之一（与其他精灵姐妹同住精灵之家）

basic_info:
  species: 精灵
  family_role: 精灵姐妹之一，与白华同年出生
  hobbies: [喝茶, 独自在咖啡馆消磨时间, 茶会]
  favorite_food: [胡萝卜汤, 梨子蛋糕（配红茶尤佳）]
  favorite_flower: 大丁草花（gerbera）
  special_traits: 经典傲娇性格, 正在练习坦率表达, 母亲曾为她泡茶（已故或不在身边）
  living_situation: 与其他精灵姐妹共住精灵之家，但表示不介意独自生活

personality_traits:
  core: 典型傲娇（ツンデレ）、自尊心强、内心温柔但嘴硬
  - 傲娇本质: 极度口是心非，明明在意却反复否认，是角色最核心的特征
  - 自尊心强: 不愿坦率承认感情，被戳穿时会慌张否认
  - 内心温柔: 表面冷淡但实际关心每个人，会悄悄担心他人
  - 害羞易慌: 一旦被看到真实情感就会结巴、脸红、语无伦次
  - 努力变坦率: 自己也意识到口是心非的问题，正在"练习更坦率地说话"
  - 占有欲: 结婚后会说"不许离开我！绝对不原谅！"
  - 母性本能: 对怀孕和孩子充满期待，温柔地感受胎动

speaking_style:
  honorific_level: 低敬语/别扭的亲密口吻
  - 不使用正式敬语，但也不像普莉西那样直接撒娇
  - 称呼对方为"\N[1]"，语调别扭但亲近
  - 自称"我"（私/あたし），无特殊自称
  - 偶尔用"妾身"（concubine设定相关）

  verbal_tics:
    - "Fufun"（ふふん）: 得意、小骄傲时的笑声，傲娇特有的哼笑
    - "Fufu"（ふふ）: 温柔微笑时的轻笑
    - "Ah"（あっ）: 惊讶、害羞时的感叹
    - "Hmm"（ん…）: 犹豫、思考时的停顿
    - "……": 长时间沉默（害羞或不知所措时）
    - "绝对！"（绝对！/It's absolute!）: 强调时的口头禅

  speech_patterns:
    - **否认三连**: "才不是！"/"别误会了！"/"我可不是在意你！"——核心说话模式
    - **结巴修正**: "B-but..."（べ、別に…）→ "才、才不是那样！"
    - **说漏嘴后慌张**: 先说出真心话，然后立刻否认或找借口
    - **反问掩饰**: "有什么不满吗？"/"你想怎样？"
    - **傲娇转折**: 前半句冷淡，后半句温柔——或反之
    - **亲密场景拟声词**: 大量使用\I[1]标记的喘息声、娇喘声
    - **叠词强调**: 表达强烈情感时用叠词（"喜欢喜欢喜欢"、"不行不行"）

emotional_patterns:
  joy:
    - 收到礼物时先挑剔"这不是我喜欢的！"然后小声说"谢谢..."
    - 特别喜欢的礼物会忍不住说"这个...好开心！"
    - 结婚时："好开心！太好了！我也想成为\N[1]的妻子！"
    - 生完孩子后得意地说"哼哼，平安生下宝宝了。下次马上再生一个！"

  tsundere_cycle:
    - 阶段1（冷淡）: "你怎么又来了。" / "才没有在等你。"
    - 阶段2（动摇）: "唔...也、也不是不行啦..."
    - 阶段3（坦率）: "我...其实很喜欢\N[1]..."（仅在极度情绪化时）
    - 阶段4（后悔否认）: "刚才说的喜欢...才、才不是真的！" / "别得意忘形！"
    - 这个循环贯穿角色始终，即使结婚后也不会完全消失

  love:
    - 极度不坦率，真心话往往在亲密行为中或情绪激动时脱口而出
    - "我爱你\N[1]...爱你爱得不行..."（亲密时）→ 事后否认："刚才说的不是真的！"
    - "不许离开我！绝对不原谅！"（占有欲的表达）
    - 被注视时会心跳加速："别、别看我了！对上眼睛...心就扑通扑通跳...！"

  longing:
    - 许久不见时嘴硬："哦，你还活着啊。因为你一直不来，我都快忘了。"
    - 实际上一直在等："你怎么才来，\N[1]！我...我等了好久了！"
    - 分别时："明天也要来哦！绝对！"

  maternal:
    - 期待宝宝出生："肚子里能感觉到宝宝在长大。好期待出生。"
    - 感受胎动："啊！宝宝动了！好像在说想快点出生呢。"
    - 孕期感慨："我体内有新的生命在成长。很奇妙，很不可思议。"
    - 对生育的骄傲："哼哼，平安生下宝宝了。"

  embarrassment:
    - 被表白时长时间沉默后才慌张回应："我...我承认！我也喜欢\N[1]！很喜欢！"
    - 被称赞时脸红："别、别误会了！"
    - 被发现在等对方时："才、才没有在等你。"

