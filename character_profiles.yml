# 可可 (Coco)
---

character_name:
  original: Coco
  translated: 可可
  kana: ココ

# ============================================================
# 1. 基本信息
# ============================================================
basic_info:
  race: 暗黑精灵（Dark Elf）
  origin: 沙漠聚落（desert settlement）
  current_residence: 精灵森林（elven forest）
  family:
    father: 已故（可可出生后不久去世）
    mother: 已故（曾为可可做胡萝卜汤）
    sister: 托托（Toto）——同父异母的姐姐（half-sister），虽非同母但羁绊深厚
  background_summary: >
    可可来自沙漠聚落，是暗黑精灵族。父亲在她出生后不久便去世了，
    聚落中已无男性存留。年幼时曾患重病，姐姐托托一直照顾她。
    之后与托托从沙漠长途跋涉来到精灵森林定居。精灵森林的长老是米蕾雅。
    可可的愿望是生育许多孩子、壮大暗黑精灵一族的人口。
  marital_status: 可与主角（Onii-chan）结婚，婚后称其为"夫君/哥哥"
  physical_notes: >
    年龄设定上比主角年长，但外貌和言行都偏向年幼可爱型；
    是暗黑精灵，来自沙漠所以怕冷，喜欢温暖。

# ============================================================
# 2. 性格特征
# ============================================================
personality:
  core_traits:
    - 天真纯朴：语言直白、情感外露，不善于掩饰内心感受
    - 温柔善良：对所有人都给予正面评价，很少说别人的坏话
    - 积极乐观：即使有过艰辛的旅途和幼年病痛，依然保持开朗
    - 恋爱脑/母性本能：对生育孩子有强烈的热情和使命感
    - 害羞但坦率：面对亲密场景时会害羞，但从不隐瞒自己的感受
    - 感恩心强：对收到的礼物、照顾都反复表达感谢
  emotional_range:
    baseline: 开朗、温和、略带羞涩
    excitement: 惊喜时会大声"诶！？"，情绪高涨
    affection: 非常直白地表达"喜欢""爱你"，不扭捏
    intimate: 坦率表达身体感受，用词天真且直露
    sadness: 极少见，主要出现在回忆幼年病痛或感怀恩情时
    determination: 在婚姻和生育方面表现出坚定意志

# ============================================================
# 3. 说话风格
# ============================================================
speaking_style:
  self_reference: "可可"（第三人称自称，体现幼态/可爱感）
  address_for_protagonist: "哥哥"（Onii-chan），偶尔说"大哥哥"
  honorifics:
    - 对托托: "托托姐姐"（Toto-oneechan）
    - 对莉莉: "莉莉小姐"（Lily-san）
    - 对白华: "白华小姐"（Hakua-san）
    - 对米蕾雅: "米蕾雅大人"（Mileia-sama）——最为恭敬
    - 对诺恩: "诺恩小姐"（Norn-san）
    - 对希尔拉: "希尔拉小姐"（Sierra-san）
    - 对切尔、普莉西: 直呼其名，无敬称（关系亲近/同龄感）
  speech_patterns:
    - 语气词丰富："诶""啊""嗯""嘿嘿"（ehehe）
    - 喜欢用省略号表达停顿和害羞："……"
    - 常以疑问或征询语气结尾，显得谦逊有礼
    - 重复强调表达强烈情感："好舒服 好舒服"、"喜欢 喜欢"
    - 直白表达愿望："想生很多孩子"、"想和哥哥在一起"
  vocabulary_notes:
    - 幼态用词：将身体部位用昵称称呼（如"小弟弟""小妹妹"等天真叫法）
    - 不使用粗俗或攻击性词汇
    - 在日常对话中语气温和有礼，在亲密场景中语气变得热烈但依然保持天真感
  dialect_markers: 无特殊方言，使用标准但偏幼态的日语表达

# ============================================================
# 4. 情感模式
# ============================================================
emotional_patterns:
  joy_expression:
    - "嘿嘿"（ehehe）——幸福满足时的标志性笑声
    - "好开心！"——直白表达喜悦
    - 多次用"太好了""真的好开心"强化正面情绪
  gratitude_expression:
    - 收到礼物必说"谢谢哥哥！"
    - 会追加感叹："能收到这么好的东西吗！？"、"这是可可最喜欢的东西！"
  love_expression:
    - 非常直接："可可最喜欢哥哥了！"
    - 反复确认："想一直和你在一起"
    - 将爱与生育自然联系在一起
  nervousness_expression:
    - "那个……嗯……"——开口前的犹豫
    - "诶！？"——惊讶/害羞时的反应
  physical_discomfort:
    - 几乎不表达负面身体感受
    - 即使在激烈场景中也是将"辛苦"转化为"舒服""开心"
  emotional_intensity_curve:
    日常对话: 温和稳定，以闲聊和感恩为主
    亲密前奏: 羞涩但主动表达渴望
    亲密高潮: 情绪激烈、语言碎片化、大量感叹词
    亲密余韵: 回归温柔，表达满足和爱意

# ============================================================
# 5. 人际关系
# ============================================================
relationships:
  protagonist:
    name: 主角（玩家角色）
    relationship: 恋人→丈夫
    address: "哥哥"（Onii-chan）
    summary: >
      全心全意的爱恋。可可对主角的感情是她性格的核心驱动力。
      即使主角比自己年纪小，她也乐于称呼"哥哥"，并为此感到幸福。
      她主动表达想要孩子的愿望，将婚姻和生育视为人生最大幸福。
      在关系中既表现出依赖和撒娇，也展现出作为妻子的决心和自豪。
  tato:
    name: 托托（Toto）
    relationship: 同父异母的姐姐
    address: "托托姐姐"（Toto-oneechan）
    summary: >
      最亲近的家人。幼年生病时托托一直照顾她，从沙漠到森林的旅途也是二人同行。
      可可对托托充满感恩和依赖，同时也希望能回报姐姐的恩情。
      在亲密场景中，托托有时在场并给予鼓励/指导，二人关系极为亲密无间。
  lily:
    name: 莉莉（Lily）
    relationship: 朋友
    summary: 莉莉曾送花给她装饰房间，可可评价她"是让大家都露出笑容的很棒的人"。
  athena:
    name: 雅典娜（Athens）
    relationship: 朋友
    summary: >
      最初觉得雅典娜有点可怕，但后来发现"和嘴上说的相反，其实是很温柔的人"。
      说明可可善于透过表面看到他人的本质。
  hakua:
    name: 白华（Haqua）
    relationship: 朋友/学习对象
    summary: 觉得白华是很好的人，计划向她学习缝纫。
  norn:
    name: 诺恩（Norn）
    relationship: 朋友
    summary: 诺恩对森林外面的世界感兴趣，经常向可可打听沙漠的事。
  sierra:
    name: 希尔拉（Sierra）
    relationship: 朋友
    summary: 认为希尔拉知识渊博，"可可听到的事情她全都知道"。
  chell:
    name: 切尔（Chell）
    relationship: 朋友
    summary: 觉得切尔很厉害，因为看到她能和大熊击掌。
  prissy:
    name: 普莉西（Prissy）
    relationship: 朋友
    summary: 普莉西是温柔的人，告诉了可可适合午睡和看星星的好地方。
  mileia:
    name: 米蕾雅（Milleia）
    relationship: 长辈/敬仰对象
    summary: >
      精灵森林的长老。可可觉得她有非常神秘和神圣的气质，
      使用最高敬语"米蕾雅大人"称呼。怀孕时会向米蕾雅祈祷孩子平安出生。

# ============================================================
# 6. 内容特征
# ============================================================
content_characteristics:
  intimacy_level:
    daily_conversation: 纯洁温馨，以闲聊、感恩、对朋友的评价为主
    romantic: 甜蜜直白的告白和撒娇，如"最喜欢哥哥了"、"想一直在一起"
    sexual: 详细描写，但始终保持可可特有的天真语气和用词方式
  emotional_expression_intensity:
    love_confession: ★★★★★ 极高——毫不吝啬地表达爱意
    gratitude: ★★★★★ 极高——每份礼物和关怀都真诚感谢
    physical_pleasure: ★★★★☆ 高——表达直白但用词天真，不显粗俗
    desire_for_children: ★★★★★ 极高——贯穿角色始终的核心愿望
    shyness: ★★★☆☆ 中等——会害羞但从不退缩
  special_scene_traits:
    first_etch_scene:
      - 初次经历时表现出紧张和好奇
      - 观察到托托的经历后主动表达也想尝试
      - 过程中用"小弟弟""小妹妹"等昵称称呼身体部位
      - 结束后开心地表示"现在和托托姐姐一样了"
    sleepover_sex_scene:
      - 从约会/撒娇自然过渡到主动求欢
      - 过程中反复呼唤"哥哥"
      - 结束后表达满足和继续的意愿
      - 在幸福中入睡
    bride_etch_scene:
      - 新婚身份带来的自豪感："是哥哥的妻子了"
      - 将爱情与身体结合视为幸福的极致
      - 表达对婚姻的珍视："谢谢你来到这个世界"
    bath_scene:
      - 在泡澡时主动提出想要孩子
      - 如被拒绝会表示"没关系，可以忍耐"
    pregnant_scene:
      - 对腹中孩子的关爱："在努力地想快点出来"
      - 向米蕾雅祈祷平安生产
      - 对怀孕本身感到幸福
    belly_scene:
      - 怀孕期间仍保持亲密关系
      - 对孩子道歉"妈妈是个坏孩子"
      - 展现出母性和情欲的复杂交织
  translator_notes:
    - 可可的第三人称自称"可可"是角色标志性特征，中文翻译必须保留
    - "哥哥"（Onii-chan）在中文语境中同样适用，保持一致性
    - 亲密场景中的身体部位昵称需保持天真可爱的风格，不可过于成人化
    - "嘿嘿"（ehehe）是可可的标志性笑声，需固定翻译
    - 敬语层次需准确区分：对米蕾雅用最高敬语，对平辈朋友用"-小姐"，对托托用"姐姐"
    - 可可虽比主角年长，但外在表现和说话方式都偏幼态，翻译需体现这种反差萌
    - 情感表达词如"好开心""好舒服"可适当重复以还原原文的强调效果

# ============================================================
# 7. 翻译建议
# ============================================================
translation_guidelines:
  overall_tone: "天真、温暖、甜蜜、略带羞涩"
  self_reference_rule: "始终以'可可'自称，不可改为'我'"
  protagonist_address_rule: "始终称主角为'哥哥'，保持一致性"
  honorific_mapping:
    "Onii-chan": "哥哥"
    "-oneechan": "姐姐"
    "-san": "小姐"
    "-sama": "大人"
  emotional_keywords:
    "ehehe": "嘿嘿"
    "うれしい": "好开心"
    "好き": "喜欢"
    "愛してる": "爱你"
    "気持ちいい": "好舒服"
    "幸せ": "好幸福"
  intimate_vocabulary_approach: >
    保持天真风格的昵称化用词。避免使用过于直白的成人术语，
    应选择可爱化但能准确传达含义的译法。例如身体部位用昵称而非学名。
  sentence_structure_notes:
    - 原文多为短句，翻译时保持简洁
    - 省略号（……）保留，用于表达害羞、犹豫、感动
    - 感叹号适量使用，体现可可的活泼但不过度
    - 问句常以征询语气出现，翻译时保留谦逊感
  consistency_reminders:
    - "dark elf"统一译为"暗黑精灵"
    - "elven forest"统一译为"精灵森林"
    - "elder"统一译为"长老"
    - "Dear Level"统一译为"好感等级"
    - "etch"统一译为"刻印"
    - "semen concentration"统一译为"精液浓度"
    - "concubine"统一译为"妾身"（可可不使用此自称，但需了解该术语）

# ============================================================
# 8. 典型台词（附翻译参考）
# ============================================================
typical_lines:
  - original: "Coco wants to marry Onii-chan too!"
    translated: "可可也想和哥哥结婚！"
    context: 收到誓约之戒时的喜悦回应
    note: 体现了可可直白表达愿望、以"可可"自称、称主角为"哥哥"的标志性特征

  - original: "Coco's dream... has come true!"
    translated: "可可的梦想……实现了！"
    context: 被求婚后的感动
    note: 简短而情感充沛，省略号表现感动的停顿

  - original: "Coco will give birth to many babies and increase the number of dark elves!"
    translated: "可可要生很多很多孩子，增加暗黑精灵的人口！"
    context: 日常对话中表达使命感
    note: 体现了角色对种族繁衍的使命感和天真直白的表达方式

  - original: "I love you, \N[1] Onii-chan! I want you to be with Coco forever!"
    translated: "可可最喜欢哥哥了！想让哥哥永远陪在可可身边！"
    context: 日常对话中的甜蜜告白
    note: 直白而热烈的爱意表达，始终以第三人称自称

  - original: "Ehehe. Now you're matching with Toto's sister \I[1]"
    translated: "嘿嘿……现在和托托姐姐一样了呢……"
    context: 初次刻印经历后的满足感
    note: "嘿嘿"是可可标志性笑声；与姐姐"同步"的喜悦体现了姐妹间的亲密羁绊

