---
# 米蕾雅 (Milleia)
---

character_profile:
  name_ja: ミレア
  name_en: Milleia
  name_zh: 米蕾雅
  basic_info:
    race: 精灵（Elf）
    role: 精灵森林的长老
    status: 可与主角结婚；婚后身份由「长老」转变为「妻子」
    special_notes: '精灵族寿命极长，米蕾雅是族中最年长者。

      精灵胎儿发育极快，怀孕仅需一天即可分娩。

      精灵在出生时会被赐予灵石（spirit stone），是制作誓约之戒的材料。

      米蕾雅将主角召唤到了这个世界（仅存男性的世界）。'
  personality:
    core_traits:
    - 温柔慈爱：作为长老，对所有精灵族人怀有母亲般的关怀，密切关注每位成员的身心状态
    - 知性沉稳：言谈间展现长者的从容与智慧，善于观察和总结
    - 谦逊自嘲：频繁以年龄自嘲，称自己「年纪大了」「老太婆」，但并非自卑，而是一种成熟的幽默
    - 母性本能：对怀孕、生育抱有深切的喜悦和期待，视孕育后代为「女性的极致喜悦」
    - 腹黑潜质：偶尔流露出「咯咯咯（kukuku）」的暗笑，暗示她有俏皮、促狭的一面
    - 嫉妒克制：虽然偶尔会想独占主角，但会主动克制，体现出作为长者的自制与大度
    - 感恩之心：对主角怀有深厚的感激之情，多次表达「谢谢你来到这个世界」
    emotional_complexity: '在端庄的长老面具之下，米蕾雅有着强烈的情感需求。

      她既渴望被宠爱，又自觉「不该独占」；既为怀孕欣喜，又为自己的热情感到害羞。

      这种「年长者的矜持」与「恋爱中少女的悸动」之间的张力，是她最核心的性格魅力。'
  speaking_style:
    formality_level: 中高
    formality_detail: '日常对话中使用较为礼貌的语言，但并非最高敬语。

      对主角说话时带有亲切感，不会过于拘谨。

      在亲密场景中会放下架子，语言变得更加直接和感性。'
    self_reference: 妾身（在亲密/情感场景中使用；日常对话中有时省略自称）
    honorifics:
    - 主様（Lord）：对主角的尊称，日常使用
    - \N[1]：直接称呼主角名字，用于亲密或感动时
    speech_patterns:
    - 口癖「咯咯咯（kukuku）」：表示得意、促狭或幸福的暗笑
    - 「……」省略号：用于表达沉思、感动或欲言又止
    - 自嘲年龄：如「明明是老太婆了」「虽然这把年纪」「她还在害臊呢」
    - 关怀式提问：经常询问主角的状态和感受，如「造人还顺利吗？」「你觉得合身吗？」
    - 对其他精灵的点评：以第三人称视角评论其他精灵的变化，展现长老的全局关怀
    vocabulary_notes:
    - 称其他精灵为「妾身的嫔妃们」，体现其后宫管理者的身份
    - 使用「造人」「播种」「受孕」等直白的生育相关词汇
    - 在亲密场景中大量使用身体感受描写，配合喘息音效（\I[1]）
    - 喜欢用「真的很……」（本当に……）句式表达深层情感
  emotional_patterns:
    joy_expressions:
    - 收到礼物时真诚感谢，并具体描述礼物的优点
    - 谈到怀孕和生育时流露出由衷的幸福
    - 与主角互动时的害羞与甜蜜
    tenderness_expressions:
    - 关心主角是否与其他精灵充分交流
    - 主动给主角零花钱（1000G）
    - 为精灵们的变化归功于主角
    vulnerability_moments:
    - 年龄焦虑：担心被认为「看起来老」
    - 独占欲：偶尔想独享主角的温柔，但随即自我克制
    - 身体敏感：被触碰时会惊慌，但很快接受
    intimate_state: '从端庄长老转变为热烈的爱人。

      使用大量第一人称感受描写（「妾身的那里」「子宫在寻找你」）。

      对「造人」行为表现出高度的投入和享受。

      高潮时语言崩溃，变为断续的喘息和重复的「喜欢」「太舒服了」。

      事后回归温柔，表达感谢和幸福。'
  relationships:
    with_protagonist:
    - 召唤者→被召唤者：米蕾雅将主角召唤到这个世界，是两人关系的起点
    - 长老→居民：主角成为森林的正式居民
    - 妻子→丈夫：结婚后成为最亲密的关系
    - 核心情感：深爱、感恩、珍惜，视主角为精灵族的救世主
    with_lily:
      relation: 关爱
      comment: 莉莉每天都很开心，能听到她快乐地唱歌
    with_athens:
      relation: 关注
      comment: 雅典娜也变得圆润了不少，不知因为主公脸红了多少次
    with_haqua:
      relation: 欣赏
      comment: 白华的光泽增加了，比以前更漂亮了。你真是个罪孽深重的男人
    with_norn:
      relation: 见证成长
      comment: 诺恩以前总说无聊无聊的……多亏了你，每天似乎都充实了
    with_sierra:
      relation: 理解
      comment: 以前觉得希尔拉有点认真过头、太死板了，多亏了主公，她有了非常温柔的表情
    with_chell:
      relation: 观察
      comment: 切尔似乎已经习惯你了。她嫉妒那些爱她的森林动物，但嫔妃们并不知情
    with_toto:
      relation: 关心
      comment: 自从给托托食物后，她就莫名地黏人了。每次都会抱过来，「好热啊」
    with_coco:
      relation: 提醒
      comment: 可可似乎对嫔妃有些误解，每天早上见面时都会合掌祈祷
    with_prissy:
      relation: 担忧
      comment: 普莉西已经相处很久了。担心她因为呆呆的，不会去找嫔妃
  content_characteristics:
    intimacy_level: 高
    intimacy_detail: '包含完整的亲密场景描写，从引导、进行到结束。

      语言从温柔引导（「妾身想让你……快点进来」）逐渐升级到激烈表达。

      使用大量身体感受词汇和喘息音效标记。'
    emotional_intensity: 高
    emotional_detail: '日常场景：温暖、感恩、关怀，强度适中

      怀孕场景：喜悦、期待、感动，强度中高

      亲密场景：热烈、沉醉、失控，强度极高

      婚后场景：幸福、满足、深情，强度高'
    special_scene_notes:
    - 首次刻印（first etch）：紧张→接纳→沉醉→高潮→感谢，完整的情感弧线
    - 新婚之夜（Bride Etch）：幸福感溢出，「终于成为母亲了」的感慨与「想要被受孕」的渴望交织
    - 浴室场景（Bath Etch）：气氛更为轻松直接，由米蕾雅主动邀请
    - 怀孕对话：充满母性光辉，对胎儿的关爱和对分娩的期待
    translator_notes:
    - 米蕾雅自称「妾身」在亲密场景中出现频率极高，需保持一致性
    - 注意区分她作为「长老」时的端庄语气和作为「爱人」时的热烈语气
    - 自嘲年龄的段落不宜翻译得过于沉重，应保留幽默感
    - kukuku的笑声需要找到合适的中文拟声词（如「咯咯咯」「呵呵呵」），体现腹黑感
    - 她对其他精灵的点评使用第三人称视角，翻译时需保持这种「旁观者关怀」的距离感
    - 亲密场景中的\I[1]是游戏引擎的音效/图标标记，翻译时保留原标记
    - 「造人」「播种」「受孕」等词汇在游戏中反复出现，需统一译法
    - 注意米蕾雅语言的双重性：外表知性优雅，内心热情奔放
  translation_suggestions:
    self_reference_zh: 妾身
    lord_zh: 主公 / 主上
    kukuku_zh: 咯咯咯
    elder_zh: 长老
    concubine_zh: 嫔妃
    key_phrases:
    - 「造人」→「造人」（保持直白感）
    - 「子種を注いで」→「注入种子」/「播种」
    - 「孕ませて」→「让妾身受孕」/「怀上你的孩子」
    - 「おまんこ」→「那里」/「小穴」（根据场景大胆程度选择）
    - 「好き好き好き」→「喜欢你 喜欢你 喜欢你」
    - 「イク」→「要去了」/「要到了」
  typical_lines:
  - context: 展现长老身份与谦逊
    line_en: '"I am the elder of this forest. Well, that doesn''t mean you didn''t do anything special."'
    line_zh: 「妾身是这片森林的长老。不过，倒也不是做了什么了不起的事啦。」
    notes: 自谦中带着从容，符合长老身份
  - context: 展现腹黑与关怀并存
    line_en: '"Lord...he''s got a stretch under his nose surrounded by cute elves." Kukuku. "You can''t help it."'
    line_zh: 「主公……被可爱的精灵们包围着，鼻子都快翘起来了呢。」咯咯咯，「没办法嘛。」
    notes: 调侃主角的后宫生活，kukuku笑声体现腹黑气质
  - context: 展现深层爱意与身份认同
    line_en: '"She might get mad at me for saying this, but I''m much happier with the title of wife than with the title of
      elder."'
    line_zh: 「虽然说这话可能会惹她生气，但……比起长老的头衔，妾身更喜欢妻子这个身份。」
    notes: 表明在她心中爱情高于地位，是角色的核心情感表达
  - context: 展现母性喜悦
    line_en: '"I can conceive and give birth to your child. She''s the ultimate joy as a woman."'
    line_zh: 「能怀上主公的孩子、生下主公的孩子……这是作为女人最大的喜悦。」
    notes: 将生育视为女性最高的幸福，体现其母性本能
  - context: 展现年长者的害羞与少女心
    line_en: '"When she thinks of her husband, her heart beats fast despite her age. Even though she''s a young girl... She''s
      so embarrassed..."'
    line_zh: 「明明这把年纪了，一想到夫君，心跳还是会加速。都已经是老太婆了……好害羞啊……」
    notes: 年龄自嘲与少女般的悸动形成反差萌，是米蕾雅最具魅力的台词之一

