控制码映射（不可翻译，仅记录）:
  - \c[N]  # 改变文字颜色
  - \i[N]  # 显示图标
  - \n[N]  # 显示角色名
  - \{  # 放大文字
  - \}  # 缩小文字
  - \|  # 等待
  - \G  # 显示货币单位
  - \$  # 打开金币窗口
  - \V[N]  # 显示变量值
  - \s[N]  # 播放SE
